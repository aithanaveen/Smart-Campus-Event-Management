# ========================
# DEMO PROFILE (No MySQL needed)
# Run with: --spring.profiles.active=demo
# ========================
spring.datasource.url=jdbc:h2:mem:smartcampus;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep app logs cleaner during live demos
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=INFO

# OTPs are always delivered through the configured SMTP account.
# Set MAIL_USERNAME and MAIL_PASSWORD before testing email verification.
