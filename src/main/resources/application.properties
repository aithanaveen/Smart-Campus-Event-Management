# ========================
# APPLICATION SETTINGS
# ========================
spring.application.name=Smart Campus Event Management
server.port=8080

# ========================
# MySQL DATABASE
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2648
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# THYMELEAF
# ========================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========================
# EMAIL (Gmail SMTP)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# API KEYS (Replace with your own)
# ========================
openai.api.key=your-openai-api-key
openai.api.url=https://api.openai.com/v1/chat/completions
google.maps.api.key=your-google-maps-api-key

# ========================
# QR CODE & CERTIFICATE PATH
# ========================
app.qrcode.path=./qrcodes/
app.certificate.path=./certificates/

# ========================
# LOGGING
# ========================
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=DEBUG
