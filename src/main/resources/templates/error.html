<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error - Smart Campus')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div style="margin-top: 76px; min-height: 60vh; display: flex; align-items: center;">
    <div class="container text-center py-5">
        <div style="font-size: 6rem;">😔</div>
        <h2 class="mt-3" style="font-weight: 800;">Oops! Something went wrong</h2>
        <p class="text-muted" th:text="${errorMessage != null} ? ${errorMessage} : 'An unexpected error occurred'">Error</p>
        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-primary-custom me-2">Go Home</a>
            <a href="javascript:history.back()" class="btn btn-outline-custom">Go Back</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
