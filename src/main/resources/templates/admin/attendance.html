<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Attendance - Smart Campus')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div style="margin-top: 76px;">
    <div class="page-header" style="background: var(--gradient-dark);">
        <div class="container">
            <h1>📋 Event Attendance</h1>
            <p th:text="${event.title}">Event Name</p>
        </div>
    </div>
    
    <div class="container py-4">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div class="row g-4 mb-4">
            <div class="col-lg-4 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon green"><i class="bi bi-person-check-fill"></i></div>
                    <div class="stat-value" th:text="${#lists.size(attendanceList)}">0</div>
                    <div class="stat-label">Total Attended</div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="bi bi-people-fill"></i></div>
                    <div class="stat-value" th:text="${event.totalSeats - event.availableSeats}">0</div>
                    <div class="stat-label">Total Registered</div>
                </div>
            </div>
        </div>
        
        <!-- Search -->
        <div class="card-custom p-3 mb-4">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text" style="background: transparent; border-right: 0; border-radius: 10px 0 0 10px;"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control form-control-custom" placeholder="Search by name or ID..." onkeyup="filterTable()" style="border-left: 0; border-radius: 0 10px 10px 0;">
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <span class="text-muted" id="resultCount"></span>
                </div>
            </div>
        </div>
        
        <div class="card-custom" style="overflow: hidden;">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="attendanceTable">
                    <thead style="background: var(--light);">
                        <tr style="font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray);">
                            <th style="padding: 14px 16px;">#</th>
                            <th style="padding: 14px 16px;">Student</th>
                            <th style="padding: 14px 16px;">Student ID</th>
                            <th style="padding: 14px 16px;">Check-in Time</th>
                            <th style="padding: 14px 16px;">Method</th>
                            <th style="padding: 14px 16px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="att, iter : ${attendanceList}" class="att-row">
                            <td style="padding: 12px 16px; font-weight: 600; color: var(--gray);" th:text="${iter.count}">1</td>
                            <td style="padding: 12px 16px;">
                                <div class="d-flex align-items-center gap-2">
                                    <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.8rem;"
                                         th:text="${#strings.substring(att.student.fullName, 0, 1)}">A</div>
                                    <div>
                                        <div style="font-weight: 600;" th:text="${att.student.fullName}">Name</div>
                                    </div>
                                </div>
                            </td>
                            <td style="padding: 12px 16px;">
                                <code style="background: var(--light); padding: 3px 8px; border-radius: 6px; font-size: 0.85rem;" th:text="${att.student.studentId}">ID</code>
                            </td>
                            <td style="padding: 12px 16px; font-size: 0.85rem; color: var(--gray);" th:text="${#temporals.format(att.checkedInAt, 'dd MMM yyyy, hh:mm a')}">Time</td>
                            <td style="padding: 12px 16px;"><span class="badge bg-info" th:text="${att.verificationMethod}">Method</span></td>
                            <td style="padding: 12px 16px;">
                                <a th:href="@{/admin/attendance/{id}/revoke(id=${att.id}, eventId=${event.id})}"
                                   class="btn btn-sm btn-outline-danger" title="Revoke Attendance"
                                   onclick="return confirm('Are you sure you want to revoke attendance for this student? This will remove their participation record.')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div th:if="${#lists.isEmpty(attendanceList)}" class="text-center py-5">
                <i class="bi bi-clipboard-x" style="font-size: 3rem; color: var(--gray-light);"></i>
                <p class="text-muted mt-2">No attendance records yet for this event.</p>
            </div>
        </div>
        
        <div class="mt-4">
            <a th:href="@{/admin/events}" class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Back to Events</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

<script>
function filterTable() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('.att-row');
    let visibleCount = 0;

    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        if (!searchVal || text.includes(searchVal)) {
            row.style.display = '';
            visibleCount++;
        } else {
            row.style.display = 'none';
        }
    });

    document.getElementById('resultCount').textContent = visibleCount + ' of ' + rows.length + ' attended';
}

document.addEventListener('DOMContentLoaded', function() {
    const rows = document.querySelectorAll('.att-row');
    document.getElementById('resultCount').textContent = rows.length + ' attended';
});
</script>
</body>
</html>
