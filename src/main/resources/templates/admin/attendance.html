<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Attendance - Smart Campus')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div style="margin-top: 76px;">
    <div class="page-header" style="background: var(--gradient-dark);">
        <div class="container">
            <h1>📋 Event Attendance</h1>
            <p th:text="${event.title}">Event Name</p>
        </div>
    </div>
    <div class="container py-4">
        <div class="card-custom p-3 mb-4">
            <strong>Total Attended:</strong> <span th:text="${#lists.size(attendanceList)}"></span>
        </div>
        <div class="table-custom">
            <table class="table table-hover mb-0">
                <thead><tr><th>#</th><th>Student</th><th>Student ID</th><th>Check-in Time</th><th>Method</th></tr></thead>
                <tbody>
                    <tr th:each="att, iter : ${attendanceList}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${att.student.fullName}">Name</td>
                        <td th:text="${att.student.studentId}">ID</td>
                        <td th:text="${#temporals.format(att.checkedInAt, 'dd MMM yyyy HH:mm')}">Time</td>
                        <td><span class="badge bg-info" th:text="${att.verificationMethod}">Method</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-3">
            <a th:href="@{/admin/events}" class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Back</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
