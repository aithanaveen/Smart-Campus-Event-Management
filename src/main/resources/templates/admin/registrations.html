<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registrations - Smart Campus')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div style="margin-top: 76px;">
    <div class="page-header" style="background: var(--gradient-dark);">
        <div class="container">
            <h1>👥 Event Registrations</h1>
            <p th:text="${event.title}">Event Name</p>
        </div>
    </div>
    <div class="container py-4">
        <div class="card-custom p-3 mb-4">
            <strong>Total Registrations:</strong> <span th:text="${#lists.size(registrations)}"></span> |
            <strong>Total Seats:</strong> <span th:text="${event.totalSeats}"></span> |
            <strong>Available:</strong> <span th:text="${event.availableSeats}"></span>
        </div>
        <div class="table-custom">
            <table class="table table-hover mb-0">
                <thead><tr><th>#</th><th>Student</th><th>Email</th><th>Seat</th><th>Code</th><th>Status</th><th>Attended</th><th>Registered At</th></tr></thead>
                <tbody>
                    <tr th:each="reg, iter : ${registrations}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${reg.student.fullName}">Name</td>
                        <td th:text="${reg.student.email}">Email</td>
                        <td><span class="badge bg-primary" th:text="${reg.seatNumber}">Seat</span></td>
                        <td><code th:text="${reg.registrationCode}">Code</code></td>
                        <td><span class="badge bg-success" th:text="${reg.status}">Status</span></td>
                        <td>
                            <span th:if="${reg.attended}" class="text-success"><i class="bi bi-check-circle-fill"></i> Yes</span>
                            <span th:if="${!reg.attended}" class="text-muted">No</span>
                        </td>
                        <td th:text="${#temporals.format(reg.registeredAt, 'dd MMM yyyy HH:mm')}">Date</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-3">
            <a th:href="@{/admin/events}" class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Back to Events</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
