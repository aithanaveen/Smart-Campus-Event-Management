<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Feedback Report - Smart Campus')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div style="margin-top: 76px;">
    <div class="page-header" style="background: var(--gradient-dark);">
        <div class="container">
            <h1>💬 Feedback Report</h1>
            <p th:text="${event.title}">Event Name</p>
        </div>
    </div>
    <div class="container py-4">
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="stat-value" th:text="${#numbers.formatDecimal(avgRating, 1, 1)}">0.0</div>
                    <div class="stat-label">Average Rating</div>
                    <div class="mt-2">
                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                              th:text="${i <= avgRating} ? '⭐' : '☆'" style="font-size: 1.3rem;"></span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <div class="stat-value" th:text="${#lists.size(feedbacks)}">0</div>
                    <div class="stat-label">Total Feedbacks</div>
                </div>
            </div>
        </div>
        <div class="table-custom">
            <table class="table table-hover mb-0">
                <thead><tr><th>Student</th><th>Rating</th><th>Comments</th><th>Date</th></tr></thead>
                <tbody>
                    <tr th:each="fb : ${feedbacks}">
                        <td th:text="${fb.student.fullName}">Name</td>
                        <td>
                            <span th:each="i : ${#numbers.sequence(1, fb.rating)}" style="color: gold;">⭐</span>
                            (<span th:text="${fb.rating}">5</span>/5)
                        </td>
                        <td th:text="${fb.comments}">Comments</td>
                        <td th:text="${#temporals.format(fb.submittedAt, 'dd MMM yyyy')}">Date</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-3">
            <a th:href="@{/admin/events}" class="btn btn-outline-custom"><i class="bi bi-arrow-left"></i> Back</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
