<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Event Form - Smart Campus')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div style="margin-top: 76px;">
    <div class="page-header" style="background: var(--gradient-dark);">
        <div class="container">
            <h1 th:text="${event.id != null} ? '✏️ Edit Event' : '➕ Create New Event'">Event Form</h1>
        </div>
    </div>
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-custom">
                    <form th:action="@{/admin/events/save}" th:object="${event}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label-custom">Event Title *</label>
                                <input type="text" th:field="*{title}" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label-custom">Description</label>
                                <textarea th:field="*{description}" class="form-control form-control-custom" rows="4"></textarea>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Event Date *</label>
                                <input type="date" th:field="*{eventDate}" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Start Time *</label>
                                <input type="time" th:field="*{startTime}" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">End Time *</label>
                                <input type="time" th:field="*{endTime}" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Venue *</label>
                                <input type="text" th:field="*{venue}" class="form-control form-control-custom" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Venue Address</label>
                                <input type="text" th:field="*{venueAddress}" class="form-control form-control-custom">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Latitude</label>
                                <input type="number" step="any" th:field="*{latitude}" class="form-control form-control-custom">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Longitude</label>
                                <input type="number" step="any" th:field="*{longitude}" class="form-control form-control-custom">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Category *</label>
                                <select th:field="*{category}" class="form-control form-control-custom" required>
                                    <option value="">Select</option>
                                    <option value="Technology">Technology</option>
                                    <option value="Cultural">Cultural</option>
                                    <option value="Sports">Sports</option>
                                    <option value="Academic">Academic</option>
                                    <option value="Workshop">Workshop</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Department</label>
                                <input type="text" th:field="*{department}" class="form-control form-control-custom">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Organizer</label>
                                <input type="text" th:field="*{organizer}" class="form-control form-control-custom">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Total Seats *</label>
                                <input type="number" th:field="*{totalSeats}" class="form-control form-control-custom" required min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Seat Rows</label>
                                <input type="number" th:field="*{seatRows}" class="form-control form-control-custom" min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label-custom">Seat Columns</label>
                                <input type="number" th:field="*{seatColumns}" class="form-control form-control-custom" min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Status</label>
                                <select th:field="*{status}" class="form-control form-control-custom">
                                    <option value="UPCOMING">Upcoming</option>
                                    <option value="ONGOING">Ongoing</option>
                                    <option value="COMPLETED">Completed</option>
                                    <option value="CANCELLED">Cancelled</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Registration Deadline</label>
                                <input type="datetime-local" th:field="*{registrationDeadline}" class="form-control form-control-custom">
                            </div>
                        </div>
                        <div class="d-flex gap-3 mt-3">
                            <button type="submit" class="btn btn-primary-custom px-4">
                                <i class="bi bi-check-lg"></i> Save Event
                            </button>
                            <a th:href="@{/admin/events}" class="btn btn-outline-custom">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
